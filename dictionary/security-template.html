<style>
:root {
  --bg-primary: #FFFFFF;
  --bg-secondary: #F8F8F8;
  --bg-tertiary: #F0F0F0;
  --bg-card: #FFFFFF;
  --text-primary: #191414;
  --text-secondary: #535353;
  --text-muted: #767676;
  --accent: #1DB954;
  --accent-hover: #1ed760;
  --accent-light: rgba(29,185,84,0.10);
  --border: #E0E0E0;
  --border-light: #F0F0F0;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.07);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.10);
  --sev-c-bg:#FFF0F1; --sev-c-text:#C41230; --sev-c-border:#FFCDD2;
  --sev-h-bg:#FFF3EE; --sev-h-text:#C84B2A; --sev-h-border:#FFD0C0;
  --sev-m-bg:#FFFBF0; --sev-m-text:#A85C00; --sev-m-border:#FFE0A0;
  --sev-l-bg:#F0FBF4; --sev-l-text:#157A3A; --sev-l-border:#B5E8C7;
  --sev-i-bg:#EEF5FF; --sev-i-text:#1E67C6; --sev-i-border:#C0D8FF;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-secondary);color:var(--text-primary);line-height:1.6;min-height:100vh}

/* HEADER */
.header{background:var(--bg-primary);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:var(--shadow-sm)}
.header-content{max-width:1280px;margin:0 auto;padding:0 24px;height:60px;display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#fff;letter-spacing:-1px}
.logo-text{font-weight:700;font-size:15px;color:var(--text-primary)}
.version-badge{background:var(--accent-light);color:var(--accent);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;border:1px solid rgba(29,185,84,.3)}
.header-controls{display:flex;align-items:center;gap:10px;margin-left:auto;flex-wrap:wrap}
.lang-toggle{display:flex;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang-btn{padding:5px 12px;border:none;background:transparent;font-size:12px;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all .15s}
.lang-btn.active{background:var(--accent);color:#fff}
.nav-controls{display:flex;align-items:center;gap:6px}
.nav-btn{padding:5px 10px;border:1px solid var(--border);background:var(--bg-primary);border-radius:6px;font-size:14px;cursor:pointer;color:var(--text-secondary);transition:all .15s}
.nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
#reportIndicator{font-size:12px;color:var(--text-muted);min-width:44px;text-align:center}
.upload-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s}
.upload-btn:hover{background:var(--accent-hover)}
.action-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;background:var(--bg-primary);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.action-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn{display:flex;align-items:center;justify-content:center;width:34px;height:34px;background:var(--bg-primary);color:var(--text-secondary);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .15s;position:relative;flex-shrink:0}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn::after{content:attr(data-tip);position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);background:var(--text-primary);color:#fff;padding:2px 8px;border-radius:4px;font-size:11px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;z-index:200}
.icon-btn:hover::after{opacity:1}
#fileInput{display:none}

/* MAIN */
.main-content{max-width:1280px;margin:0 auto;padding:24px}

/* EMPTY STATE */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:48px 24px}
.empty-icon{font-size:60px;margin-bottom:20px;opacity:.5}
.empty-title{font-size:22px;font-weight:700;color:var(--text-primary);margin-bottom:10px}
.empty-desc{font-size:14px;color:var(--text-secondary);max-width:440px;margin-bottom:28px;line-height:1.7}
.drop-zone{border:2px dashed var(--border);border-radius:16px;padding:44px;width:100%;max-width:480px;cursor:pointer;transition:all .2s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-light)}
.drop-zone-text{font-size:14px;color:var(--text-muted);line-height:1.8}
.drop-zone-highlight{color:var(--accent);font-weight:700}

/* SCAN META BAR */
.scan-meta-bar{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.scan-meta-item{display:flex;flex-direction:column;gap:2px}
.scan-meta-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.scan-meta-value{font-size:13px;font-weight:600;color:var(--text-primary)}

/* SUMMARY GRID */
.summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:16px}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;text-align:center;box-shadow:var(--shadow-sm)}
.summary-count{font-size:28px;font-weight:800;line-height:1.1;margin-bottom:4px}
.summary-label{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.cnt-c{color:var(--sev-c-text)} .cnt-h{color:var(--sev-h-text)} .cnt-m{color:var(--sev-m-text)} .cnt-l{color:var(--sev-l-text)} .cnt-a{color:var(--accent)}

/* GRAPH VERDICT CARD */
.graph-verdict-card{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:18px 20px;margin-bottom:14px;box-shadow:var(--shadow-sm);display:flex;align-items:flex-start;gap:16px;flex-wrap:wrap}
.graph-verdict-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.graph-verdict-sub{font-size:13px;color:var(--text-secondary);margin-top:5px}

/* SECTIONS */
.section{background:var(--bg-card);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;box-shadow:var(--shadow-sm);overflow:hidden}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .15s}
.section-header:hover{background:var(--bg-secondary)}
.section-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:14px;color:var(--text-primary)}
.section-count{background:var(--bg-tertiary);color:var(--text-secondary);padding:2px 8px;border-radius:12px;font-size:12px;font-weight:600}
.section-toggle{font-size:13px;color:var(--text-muted);transition:transform .2s}
.section.collapsed .section-toggle{transform:rotate(-90deg)}
.section-content{padding:0 18px 18px}
.section.collapsed .section-content{display:none}

/* FINDING CARDS */
.finding-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px;transition:box-shadow .15s}
.finding-card:hover{box-shadow:var(--shadow-md)}
.finding-header{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:9px}
.finding-id{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:11px;font-weight:700;background:var(--bg-tertiary);color:var(--text-secondary);padding:2px 6px;border-radius:4px;flex-shrink:0}
.finding-title{font-weight:600;font-size:14px;color:var(--text-primary);flex:1;min-width:0}
.finding-meta{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.finding-meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-secondary)}
.finding-meta-label{color:var(--text-muted);font-weight:500}
.finding-meta-item code{background:var(--bg-tertiary);padding:1px 5px;border-radius:4px;font-family:'SF Mono',Consolas,monospace;font-size:11px;color:var(--text-primary)}
.finding-description{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:8px}
.finding-detail{background:var(--bg-secondary);border-radius:8px;padding:10px 12px;margin-top:8px}
.finding-detail-title{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.finding-detail-content{font-size:13px;color:var(--text-secondary);line-height:1.6}
.dd-pre{white-space:pre-wrap;word-break:break-word}
.code-fix{background:var(--bg-secondary);border-radius:8px;padding:10px 12px;margin-top:8px}
.code-fix-block{margin-top:6px}
.code-fix-label{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.cf-before .code-fix-label{color:var(--sev-c-text)}
.cf-after .code-fix-label{color:var(--sev-l-text)}
.code-lang{font-family:'SF Mono',Consolas,monospace;font-size:9px;font-weight:600;text-transform:none;letter-spacing:0;background:var(--bg-tertiary);color:var(--text-muted);padding:1px 6px;border-radius:4px}
.code-block{font-family:'SF Mono','Fira Code',Consolas,monospace;font-size:12px;line-height:1.5;background:var(--bg-primary);border:1px solid var(--border);border-radius:6px;padding:10px 12px;overflow-x:auto;white-space:pre;color:var(--text-primary);margin:0}
.cf-before .code-block{border-left:3px solid var(--sev-c-text)}
.cf-after .code-block{border-left:3px solid var(--sev-l-text)}
.code-fix-note{font-size:12px;color:var(--text-secondary);line-height:1.6;margin-top:6px}

/* BADGES */
.severity-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;flex-shrink:0}
.sev-critical{background:var(--sev-c-bg);color:var(--sev-c-text);border:1px solid var(--sev-c-border)}
.sev-high{background:var(--sev-h-bg);color:var(--sev-h-text);border:1px solid var(--sev-h-border)}
.sev-medium{background:var(--sev-m-bg);color:var(--sev-m-text);border:1px solid var(--sev-m-border)}
.sev-low{background:var(--sev-l-bg);color:var(--sev-l-text);border:1px solid var(--sev-l-border)}
.sev-info{background:var(--sev-i-bg);color:var(--sev-i-text);border:1px solid var(--sev-i-border)}

.verdict-badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:12px;font-size:11px;font-weight:800;letter-spacing:.5px;flex-shrink:0}
.verd-install_ok{background:#F0FBF4;color:#157A3A;border:1px solid #B5E8C7}
.verd-review{background:#FFFBF0;color:#A85C00;border:1px solid #FFE0A0}
.verd-disable{background:#FFF3EE;color:#C84B2A;border:1px solid #FFD0C0}
.verd-remove{background:#FFF0F1;color:#C41230;border:1px solid #FFCDD2}
.verdict-badge-lg{font-size:14px!important;padding:5px 16px!important;border-radius:14px!important;letter-spacing:.8px!important}
.sev-badge-lg{font-size:14px!important;padding:5px 16px!important;border-radius:14px!important;letter-spacing:.6px!important}
.risk-overall{margin-top:12px;padding:10px 12px;background:var(--bg-primary);border-radius:8px;border:1px solid var(--border-light)}
.risk-overall-hd{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-bottom:8px}
.risk-overall-body{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.risk-overall-basis{font-size:11px;color:var(--text-secondary);background:var(--bg-secondary);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}
.risk-overall-rationale{font-size:12px;color:var(--text-secondary);line-height:1.55;margin-top:8px;padding-top:8px;border-top:1px solid var(--border-light)}

.meff-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.3px;flex-shrink:0}
.meff-valid{background:#F0FBF4;color:#157A3A;border:1px solid #B5E8C7}
.meff-degraded{background:#FFFBF0;color:#A85C00;border:1px solid #FFE0A0}
.meff-obsolete{background:#FFF3EE;color:#C84B2A;border:1px solid #FFD0C0}
.meff-locked{background:#FFF0F1;color:#C41230;border:1px solid #FFCDD2}

.pattern-badge{display:inline-flex;align-items:center;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700;background:#EEF5FF;color:#1E67C6;border:1px solid #C0D8FF;font-family:'SF Mono',Consolas,monospace}
.edge-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;background:#F3F0FF;color:#5B3FBF;border:1px solid #D4C5FF;font-family:'SF Mono',Consolas,monospace}
.cve-badge{background:var(--sev-c-bg);color:var(--sev-c-text);border:1px solid var(--sev-c-border);padding:2px 6px;border-radius:4px;font-size:11px;font-weight:600;font-family:'SF Mono',Consolas,monospace}
a.cve-badge{text-decoration:none}
a.cve-badge:hover{filter:brightness(.96)}
.vuln-link{display:inline-block;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:700;text-decoration:none;margin-right:4px;border:1px solid;white-space:nowrap;vertical-align:middle}
.vuln-link.osv{background:#EEF5FF;color:#1E67C6;border-color:#C0D8FF}
.vuln-link.osv-clean{background:#F0FBF4;color:#157A3A;border-color:#B5E8C7}
.vuln-link.osv-hit{background:#FFF0F1;color:#C41230;border-color:#FFCDD2}
.vuln-link:hover{filter:brightness(.95)}
button.vuln-link{cursor:pointer;font-family:inherit;outline:none;line-height:1.4;transition:all .15s}
button.vuln-link:disabled{opacity:.55;cursor:wait}

/* REPO SUMMARY */
.repo-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
.repo-item{background:var(--bg-secondary);border-radius:8px;padding:10px 12px}
.repo-item-label{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.comp-tag{display:inline-block;background:var(--accent-light);color:var(--accent);border:1px solid rgba(29,185,84,.3);border-radius:6px;padding:2px 8px;font-size:12px;font-weight:600;margin:2px}
.sensitive-tag{display:inline-block;background:var(--sev-h-bg);color:var(--sev-h-text);border:1px solid var(--sev-h-border);border-radius:6px;padding:2px 8px;font-size:12px;margin:2px}

/* RELATIONSHIP GRAPH */
.rel-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:10px}
.edge-path{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:8px}
.node-chip{background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;color:var(--text-primary)}
.edge-arrow{color:var(--text-muted);font-size:13px}
.score-chip{font-size:12px;color:var(--text-secondary);background:var(--bg-secondary);border:1px solid var(--border);border-radius:6px;padding:3px 8px}

/* SBOM */
.sbom-overview{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:14px}

.risk-matrix{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:14px}
.risk-matrix th{text-align:left;padding:8px 10px;background:var(--bg-secondary);color:var(--text-muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.3px;border-bottom:1px solid var(--border)}
.risk-matrix td{padding:8px 10px;border-bottom:1px solid var(--border-light);color:var(--text-secondary)}
.risk-matrix tr:last-child td{border-bottom:none}
.priority-action{display:flex;gap:10px;padding:10px 12px;background:var(--bg-secondary);border-radius:8px;margin-bottom:8px}
.priority-rank{width:26px;height:26px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;flex-shrink:0;margin-top:2px}
.priority-pkg{font-weight:700;font-size:13px;color:var(--text-primary);margin-bottom:3px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.priority-ver,.priority-rationale{font-size:12px;color:var(--text-secondary);margin-top:2px}
.priority-act{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px}
.cat-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;background:var(--bg-tertiary);color:var(--text-secondary)}
.sub-heading{font-size:13px;font-weight:700;color:var(--text-primary);margin:14px 0 8px;display:flex;align-items:center;gap:6px}

.rec-card{background:var(--bg-secondary);border-radius:10px;padding:14px;margin-bottom:10px;border-left:4px solid var(--border)}

.rec-prio-badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700;letter-spacing:.3px}

.rec-files{font-size:12px;color:var(--text-muted);margin-top:5px;font-family:'SF Mono',Consolas,monospace}

function t(k){ return S[currentLang][k] || k; }

function getData(r){
  if(currentLang==='ko' && r.korean_report) return r.korean_report;
  return r.english_report || r;
}

function sevClass(s){
  if(s===null||s===undefined||s==='') return 'info';
  var v=String(s).toLowerCase();
  if(v==='critical'||v==='심각') return 'critical';
  if(v==='high'||v==='높음') return 'high';
  if(v==='medium'||v==='중간') return 'medium';
  if(v==='low'||v==='낮음') return 'low';
  return 'info';
}

function sevColor(s){
  var c=sevClass(s);
  var m={critical:'#C41230',high:'#C84B2A',medium:'#A85C00',low:'#157A3A',info:'#1E67C6'};
  return m[c]||'#767676';
}

function esc(str){
  if(str===null||str===undefined) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Map a package-manager / ecosystem string to the OSV ecosystem code.
function osvEcosystem(pm){
  if(!pm) return '';
  var m={npm:'npm',yarn:'npm',pnpm:'npm',
    pip:'PyPI',pypi:'PyPI',python:'PyPI',poetry:'PyPI',pipenv:'PyPI',
    maven:'Maven',gradle:'Maven',java:'Maven',
    go:'Go',gomod:'Go',cargo:'crates.io',rust:'crates.io','crates.io':'crates.io',
    gem:'RubyGems',bundler:'RubyGems',ruby:'RubyGems',rubygems:'RubyGems',
    composer:'Packagist',php:'Packagist',packagist:'Packagist',
    nuget:'NuGet',dotnet:'NuGet'};
  return m[String(pm).toLowerCase()]||'';
}

// Render a CVE lookup button that calls OSV API live (browser has network; scanner sandbox does not).
// On click: POST https://api.osv.dev/v1/query with {version, package:{name,ecosystem}}.
// Results rendered inline: CVE badges or a "no known CVEs" label.
// Falls back to opening the OSV search page on network error.
function vulnLinks(name, version, links, ecosystem){
  if(!name) return '';
  var eco=osvEcosystem(ecosystem);
  var fallback=(links&&links.osv)?links.osv:
    'https://osv.dev/list?q='+encodeURIComponent(name)+(eco?'&ecosystem='+encodeURIComponent(eco):'');
  return '<button class="vuln-link osv" '+
    'data-pkg="'+esc(name)+'" '+
    'data-ver="'+esc(version||'')+'" '+
    'data-eco="'+esc(eco)+'" '+

// Live OSV API query — called when the user clicks a vuln button.
function checkOSV(btn){
  if(btn.dataset.checked) return;
  btn.disabled=true;
  btn.textContent='...';
  var body={package:{name:btn.dataset.pkg}};
  if(btn.dataset.ver) body.version=btn.dataset.ver;
  if(btn.dataset.eco) body.package.ecosystem=btn.dataset.eco;
  fetch('https://api.osv.dev/v1/query',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(body)
  })
  .then(function(r){return r.json();})
  .then(function(data){
    btn.dataset.checked='1';
    var vulns=data.vulns||[];
    var cell=btn.parentElement;
    var res=cell.querySelector('.osv-result');
    if(!res){res=document.createElement('span');res.className='osv-result';cell.appendChild(res);}
    if(vulns.length===0){
      btn.textContent='✓';
      btn.className='vuln-link osv osv-clean';
      res.innerHTML='<span class="osv-none">No known CVEs</span>';
    } else {
      var ids=[];
      vulns.forEach(function(v){
        (v.aliases||[]).forEach(function(a){if(a.indexOf('CVE-')===0)ids.push(a);});
        if(!ids.length&&v.id)ids.push(v.id);
      });
      // deduplicate
      ids=ids.filter(function(v,i,a){return a.indexOf(v)===i;});
      btn.textContent=vulns.length+(vulns.length===1?' CVE':' CVEs');
      btn.className='vuln-link osv osv-hit';
      var shown=ids.slice(0,4).map(function(c){return cveLink(c);}).join('');
      var more=ids.length>4?'<span class="osv-more">+'+( ids.length-4)+'</span>':'';
      res.innerHTML=shown+more;
    }
    btn.disabled=false;
  })
  .catch(function(){
    btn.textContent='?';
    btn.title='네트워크 오류 — 클릭하면 OSV 검색 페이지로 이동';
    btn.disabled=false;
    btn.dataset.checked='';
    btn.onclick=function(){window.open(btn.dataset.fb,'_blank','noopener,noreferrer');};
  });
}

function countSev(data,s){
  var c=0;
  var arrs=[data.static_code_findings,data.binary_analysis_findings,data.skill_risk_findings,
    data.agent_policy_findings,data.sensitive_patterns,data.prompt_optimization,
    data.relationship_findings,data.model_validity_findings];
  arrs.forEach(function(a){
    if(Array.isArray(a)) a.forEach(function(f){ if(f&&f.severity&&sevClass(f.severity)===s) c++; });
  });
  return c;
}

// True if a finding's status excludes it from active risk (False Positive / Mitigated).
function isClearedStatus(st){
  if(!st) return false;
  var v=String(st).toLowerCase().trim();
  return v==='false positive'||v==='오탐'||v==='mitigated'||v==='완화됨';
}

// Overall risk = highest severity among findings NOT marked False Positive/Mitigated.
function overallRisk(data){
  var arrs=[data.static_code_findings,data.binary_analysis_findings,data.skill_risk_findings,
    data.agent_policy_findings,data.sensitive_patterns,data.prompt_optimization,
    data.relationship_findings,data.model_validity_findings];
  var rank={critical:4,high:3,medium:2,low:1,info:0};
  var bestCls='', bestRank=-1, active=0;
  arrs.forEach(function(a){
    if(!Array.isArray(a)) return;
    a.forEach(function(f){
      if(!f||!f.severity) return;
      if(isClearedStatus(f.status)) return;
      active++;
      var cls=sevClass(f.severity), r=rank[cls];
      if(r>bestRank){ bestRank=r; bestCls=cls; }
    });
  });
  return {cls:bestCls, active:active};
}

function renderDonutChartSVG(c,h,m,l){
  var total=c+h+m+l;
  var sz=132,r=48,cx=66,cy=66,circ=2*Math.PI*r,sw=18;
  if(total===0) return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bg-tertiary)" stroke-width="'+sw+'"/><text x="'+cx+'" y="'+(cy+5)+'" text-anchor="middle" font-size="12" fill="var(--text-muted)" font-family="sans-serif">0</text></svg>';
  var segs=[{v:c,col:'#C41230'},{v:h,col:'#C84B2A'},{v:m,col:'#A85C00'},{v:l,col:'#157A3A'}];
  var off=0;
  var paths=segs.filter(function(s){return s.v>0;}).map(function(s){
    var len=(s.v/total)*circ-2;
    var p='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.col+'" stroke-width="'+sw+'" stroke-dasharray="'+Math.max(0,len)+' '+(circ)+'" stroke-dashoffset="'+(-off)+'" transform="rotate(-90 '+cx+' '+cy+')"/>';
    off+=(s.v/total)*circ; return p;
  }).join('');
  return '<svg width="'+sz+'" height="'+sz+'" viewBox="0 0 '+sz+' '+sz+'">'+
    '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bg-tertiary)" stroke-width="'+sw+'"/>'+
    paths+
    '<text x="'+cx+'" y="'+(cy-5)+'" text-anchor="middle" font-size="22" font-weight="800" fill="var(--text-primary)" font-family="sans-serif">'+total+'</text>'+
    '<text x="'+cx+'" y="'+(cy+13)+'" text-anchor="middle" font-size="10" fill="var(--text-muted)" font-family="sans-serif">findings</text>'+
  '</svg>';
}

function initRiskChart(c,h,m,l){
  var canvas=document.getElementById('risk-donut-canvas');
  if(!canvas) return;
  var total=c+h+m+l;
  if(typeof Chart==='undefined'){
    var fb=document.getElementById('risk-donut-fallback');
    if(fb){fb.innerHTML=renderDonutChartSVG(c,h,m,l);fb.style.display='block';}
    canvas.style.display='none'; return;
  }
  var existing=Chart.getChart(canvas);
  if(existing) existing.destroy();
  if(total===0){canvas.style.display='none';return;}
  var cs=getComputedStyle(document.documentElement);
  var textColor=cs.getPropertyValue('--text-primary').trim()||'#1A1A2E';
  var mutedColor=cs.getPropertyValue('--text-muted').trim()||'#8B8FA8';
  var centerPlugin={
    id:'tss-center',
    afterDraw:function(chart){
      var ctx=chart.ctx,ca=chart.chartArea;
      var cx=ca.left+(ca.right-ca.left)/2,cy=ca.top+(ca.bottom-ca.top)/2;
      ctx.save();
      ctx.font='bold 22px system-ui,sans-serif';
      ctx.fillStyle=textColor;
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillText(total,cx,cy-6);
      ctx.font='10px system-ui,sans-serif';
      ctx.fillStyle=mutedColor;
      ctx.fillText('findings',cx,cy+10);
      ctx.restore();
    }
  };
  var segLabels={
    id:'tss-seglabels',
    afterDatasetsDraw:function(chart){
      var ctx=chart.ctx;
      chart.data.datasets.forEach(function(ds,i){
        chart.getDatasetMeta(i).data.forEach(function(arc,j){
          var v=ds.data[j];
          if(!v) return;
          var cp=arc.getCenterPoint();
          ctx.save();
          ctx.font='bold 13px system-ui,sans-serif';
          ctx.fillStyle='#ffffff';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          ctx.shadowColor='rgba(0,0,0,0.35)';
          ctx.shadowBlur=3;
          ctx.fillText(v,cp.x,cp.y);
          ctx.restore();
        });
      });
    }
  };
  new Chart(canvas,{
    type:'doughnut',
    data:{
      labels:[t('critical'),t('high'),t('medium'),t('low')],
      datasets:[{data:[c,h,m,l],backgroundColor:['#C41230','#C84B2A','#A85C00','#157A3A'],borderWidth:3,borderColor:'var(--bg-primary)',hoverBorderColor:'var(--bg-primary)'}]
    },
    options:{
      responsive:false,cutout:'60%',
      plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){return ctx.label+': '+ctx.parsed;}}}}
    },
    plugins:[centerPlugin,segLabels]
  });
}

// Jump to a finding card by id: reveal its section (if collapsed), scroll, briefly highlight.
function scrollToFinding(id){
  var el=document.getElementById('finding-'+id);

  if(sec) sec.classList.remove('collapsed');

function exportHTML(){
  if(!reports.length){ alert('No report loaded'); return; }
  var report=reports[currentReportIndex];
  var origFilename=report._filename||'scanreport.json';
  var exportLang=currentLang;

  var exportData=JSON.parse(JSON.stringify(report));
  delete exportData._filename;
  var dataJson=JSON.stringify(exportData).replace(/</g,'\\u003C');
  var safeFilename=origFilename.replace(/\\/g,'\\\\').replace(/"/g,'\\"');

  var so='<'+'script';
  var sc='<'+'/'+'script>';

  var dataBlock=so+' id="__TSS__" type="application/json">\n'+dataJson+'\n'+sc;

  var exportStyle='<style id="__tss_ex__">#exportBtn,.upload-btn,.nav-controls{display:none!important}</style>';

  var bootScript=
    so+'>\n'+
    '(function(){\n'+
    '  var _D=JSON.parse(document.getElementById("__TSS__").textContent);\n'+
    '  _D._filename="'+safeFilename+'";\n'+
    '  currentLang="'+exportLang+'";\n'+
    '  function _init(){\n'+
    '    reports=[_D]; currentReportIndex=0;\n'+
    '    document.querySelectorAll(".lang-btn").forEach(function(b){\n'+
    '      b.classList.toggle("active",b.dataset.lang===currentLang);\n'+
    '    });\n'+
    '    renderReport(reports[0]); updateNav();\n'+
    '  }\n'+
    '  if(document.readyState==="loading")\n'+
    '    document.addEventListener("DOMContentLoaded",_init);\n'+
    '  else _init();\n'+
    '})();\n'+
    sc;

  var html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
  var headClose=html.indexOf('</head>');
  if(headClose!==-1) html=html.slice(0,headClose)+exportStyle+'\n</head>'+html.slice(headClose+7);
  var bodyClose=html.lastIndexOf('</body>');
  if(bodyClose===-1) bodyClose=html.lastIndexOf('</BODY>');
  html=bodyClose===-1
    ? html+'\n'+dataBlock+'\n'+bootScript
    : html.slice(0,bodyClose)+dataBlock+'\n'+bootScript+'\n</body>';

  var filename=origFilename.replace(/\.json$/i,'')+'.html';
  var blob=new Blob([html],{type:'text/html;charset=utf-8'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url; a.download=filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function updateNav(){
  document.getElementById('prevReport').disabled=currentReportIndex<=0;
  document.getElementById('nextReport').disabled=currentReportIndex>=reports.length-1;
  document.getElementById('reportIndicator').textContent=reports.length>0?(currentReportIndex+1)+' / '+reports.length:'0 / 0';
}

function loadReports(files){
  var promises=Array.from(files).map(function(file){
    return new Promise(function(resolve){
      var r=new FileReader();
      r.onload=function(e){
        try{ var j=JSON.parse(e.target.result); j._filename=file.name; resolve(j); }
        catch(err){ console.error('Parse error:',file.name,err); resolve(null); }
      };
      r.onerror=function(){ resolve(null); };
      r.readAsText(file);
    });
  });
  Promise.all(promises).then(function(res){
    reports=res.filter(Boolean);
    reports.sort(function(a,b){ return (b._filename||'').localeCompare(a._filename||''); });
    if(reports.length>0){ currentReportIndex=0; renderReport(reports[0]); }
    updateNav();
  });
}

document.getElementById('fileInput').addEventListener('change',function(e){
  if(e.target.files.length>0) loadReports(e.target.files);
});
document.getElementById('prevReport').addEventListener('click',function(){
  if(currentReportIndex>0){ currentReportIndex--; renderReport(reports[currentReportIndex]); updateNav(); }
});
document.getElementById('nextReport').addEventListener('click',function(){
  if(currentReportIndex<reports.length-1){ currentReportIndex++; renderReport(reports[currentReportIndex]); updateNav(); }
});

      el.textContent=currentLang==='ko'?el.dataset.ko:el.dataset.en;

  });
});

// Drag and Drop
var dropZone=document.getElementById('dropZone');
document.body.addEventListener('dragover',function(e){ e.preventDefault(); });
document.body.addEventListener('dragenter',function(){ if(dropZone) dropZone.classList.add('drag-over'); });
document.body.addEventListener('dragleave',function(e){ if(!e.relatedTarget||!document.body.contains(e.relatedTarget)) if(dropZone) dropZone.classList.remove('drag-over'); });
document.body.addEventListener('drop',function(e){
  e.preventDefault();
  if(dropZone) dropZone.classList.remove('drag-over');
  var files=Array.from(e.dataTransfer.files).filter(function(f){ return f.name.endsWith('.json'); });
  if(files.length>0) loadReports(files);
});

updateNav();
</script>
</body>
</html>
